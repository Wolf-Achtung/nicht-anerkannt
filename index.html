<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Das Atelier der Radikalen Mitte</title>
  <meta name="description" content="Das Atelier der Radikalen Mitte — Weiterleitung zur jeweiligen Sprachfassung.">
  <!-- hreflang:begin -->
  <link rel="canonical" href="https://nicht-anerkannt.info/de/">
  <link rel="alternate" hreflang="de" href="https://nicht-anerkannt.info/de/">
  <link rel="alternate" hreflang="en" href="https://nicht-anerkannt.info/en/">
  <link rel="alternate" hreflang="x-default" href="https://nicht-anerkannt.info/de/">
  <!-- hreflang:end -->
  <meta http-equiv="refresh" content="0; url=/de/">
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('atelier-lang');
        if (stored === 'en') { location.replace('/en/'); return; }
        if (stored === 'de') { location.replace('/de/'); return; }
      } catch (e) { /* no storage */ }
      var nav = (navigator.language || 'de').slice(0, 2).toLowerCase();
      location.replace(nav === 'en' ? '/en/' : '/de/');
    })();
  </script>
  <style>
    body { font-family: Georgia, serif; background: #f3ecdf; color: #111; padding: 4rem 1rem; text-align: center; }
    a { color: #be1e1e; }
  </style>
</head>
<body>
  <p>Weiterleitung… / Redirecting…</p>
  <p><a href="/de/">Deutsch</a> · <a href="/en/">English</a></p>
</body>
</html>
